<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>my nyc wfh cafés</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream: #f7f4ef;
      --ink: #1a1814;
      --warm-mid: #9c8c7a;
      --accent: #c4633a;
      --soft: #e8e2d9;
      --card-bg: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* HEADER */
    header {
      padding: 80px 60px 60px;
      max-width: 1100px;
      margin: 0 auto;
      border-bottom: 1px solid var(--soft);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 40px;
      flex-wrap: wrap;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .header-meta {
      text-align: right;
    }

    .header-meta .count {
      font-size: 3rem;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      color: var(--accent);
      line-height: 1;
    }

    .header-meta .count-label {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm-mid);
      margin-top: 4px;
    }

    .header-sub {
      margin-top: 24px;
      font-size: 0.95rem;
      color: var(--warm-mid);
      max-width: 480px;
      line-height: 1.6;
    }

    /* FILTERS */
    .filters {
      max-width: 1100px;
      margin: 40px auto 0;
      padding: 0 60px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--warm-mid);
      margin-right: 4px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--soft);
      border-radius: 100px;
      padding: 6px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--warm-mid);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--cream);
    }

    /* GRID */
    .café-grid {
      max-width: 1100px;
      margin: 50px auto 100px;
      padding: 0 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }

    /* CARD */
    .card {
      background: var(--card-bg);
      border-radius: 4px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: 1px solid var(--soft);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(26,24,20,0.08);
    }

    .card-top {
      padding: 28px 28px 0;
    }

    .card-neighborhood {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .card-address {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--warm-mid);
    }

    /* RATING */
.card-rating {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
}

.rating-badge {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--accent);
  line-height: 1;
}

.rating-bar-track {
  flex: 1;
  height: 3px;
  background: var(--soft);
  border-radius: 2px;
  max-width: 80px;
}

.rating-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
}

.rating-num {
  font-size: 0.75rem;
  color: var(--warm-mid);
}
    /* REVIEW */
    .card-review {
      margin-top: 16px;
      padding: 0 28px;
      font-size: 0.9rem;
      line-height: 1.65;
      color: #4a4540;
    }

    /* TAGS */
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 20px 28px 28px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--cream);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 0.75rem;
      color: var(--warm-mid);
    }

    .tag-icon {
      font-size: 0.85rem;
    }

    .tag.good { color: #5a7a5a; background: #eef3ee; }
    .tag.ok   { color: #7a6a3a; background: #f5f0e5; }
    .tag.bad  { color: #7a4a4a; background: #f5eaea; }

    /* VISITED */
    .card-footer {
      border-top: 1px solid var(--soft);
      padding: 12px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .visited-date {
      font-size: 0.75rem;
      color: var(--warm-mid);
      letter-spacing: 0.04em;
    }

    .visited-badge {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    /* EMPTY STATE */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--warm-mid);
    }

    .empty p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.2rem;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px;
      font-size: 0.78rem;
      color: var(--warm-mid);
      border-top: 1px solid var(--soft);
      letter-spacing: 0.06em;
    }

    @media (max-width: 680px) {
      header, .filters, .café-grid {
        padding-left: 24px;
        padding-right: 24px;
      }
      header { padding-top: 48px; }
      .café-grid { grid-template-columns: 1fr; }
      .header-top { flex-direction: column; align-items: flex-start; }
      .header-meta { text-align: left; }
    }

    /* NEWSLETTER BAR */
.newsletter-bar {
  background: var(--ink);
  padding: 22px 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.newsletter-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  z-index: 1;
}

.newsletter-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--cream);
  letter-spacing: 0.02em;
  text-align: center;
}

.newsletter-form {
  display: flex;
  gap: 0;
  align-items: center;
}

.newsletter-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(247,244,239,0.35);
  padding: 8px 14px 8px 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 300;
  color: var(--cream);
  outline: none;
  width: 220px;
  transition: border-color 0.2s ease;
}

.newsletter-input::placeholder {
  color: rgba(247,244,239,0.4);
}

.newsletter-input:focus {
  border-bottom-color: var(--accent);
}

.newsletter-btn {
  background: none;
  border: none;
  border-bottom: 1px solid var(--accent);
  padding: 8px 0 8px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 400;
  color: var(--accent);
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: color 0.2s ease;
  white-space: nowrap;
}

.newsletter-btn:hover {
  color: var(--cream);
  border-bottom-color: var(--cream);
}

/* SPARKLES */
.sparkle {
  position: absolute;
  color: rgba(247,244,239,0.25);
  font-size: 0.7rem;
  animation: twinkle 3s ease-in-out infinite;
  pointer-events: none;
}

.s1 { top: 8px;  left: 12%;  animation-delay: 0s;    font-size: 0.6rem; }
.s2 { top: 18px; left: 28%;  animation-delay: 0.6s;  font-size: 0.5rem; }
.s3 { bottom: 8px; left: 20%; animation-delay: 1.1s; font-size: 0.55rem; }
.s4 { top: 10px; right: 22%; animation-delay: 0.3s;  font-size: 0.65rem; }
.s5 { bottom: 10px; right: 14%; animation-delay: 0.9s; font-size: 0.5rem; }

@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50%       { opacity: 0.8; transform: scale(1.4); }
}

@media (max-width: 680px) {
  .newsletter-bar { padding: 20px 24px; }
  .newsletter-input { width: 160px; }
  .s2, .s3 { display: none; }
}
    /* NAV */
.site-nav {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 60px 0;
  display: flex;
  justify-content: flex-end;
}

.nav-link {
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  transition: opacity 0.2s ease;
}

.nav-link:hover { opacity: 0.6; }
  </style>
</head>
<body>
  
<header>
  <div class="header-top">
    <h1>my nyc<br><em>wfh cafés</em></h1>
    <div class="header-meta">
      <div class="count" id="total-count">6</div>
      <div class="count-label">cafés visited</div>
    </div>
  </div>
  <p class="header-sub">Rating the café's i've been to in New York City & being deadass </p>
</header>
<nav class="site-nav">
  <a href="subscribe.html" class="nav-link">✦ get notified</a>
</nav>
<div class="filters">
  <span class="filter-label">Filter —</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="Lower East Side">Lower East Side</button>
  <button class="filter-btn" data-filter="Williamsburg">Williamsburg</button>
  <button class="filter-btn" data-filter="West Village">West Village</button>
  <button class="filter-btn" data-filter="Midtown">Midtown</button>
  <button class="filter-btn" data-filter="Brooklyn Heights">Brooklyn Heights</button>
  <button class="filter-btn" data-filter="Nolita">Nolita</button>
</div>

<div class="café-grid" id="café-grid">
  <!-- cards injected by JS -->
</div>

<footer>updated march 2026 &nbsp;·&nbsp; new york city</footer>

<script>
  const cafes = [
    {
      name: "Devoción",
      neighborhood: "Williamsburg",
      address: "69 Grand St, Brooklyn",
      rating: 5,
      review: "Stunning space — the living wall alone is worth the trip. Fast WiFi, plenty of outlets, and the coffee is genuinely exceptional. Gets busy by 11am but never chaotic. My go-to for a full day of deep work.",
      wifi: "great",
      outlets: "plenty",
      noise: "moderate",
      visited: "Feb 2026"
    },
    {
      name: "Georgie's Coffee",
      neighborhood: "Lower East Side",
      address: "182 Broome St, FL 2, New York, NY 10002",
      rating: 1.7,
      review: "Always packed, and unfortunately everyone is there with their friends hogging seats. There's a lack of outlets, and while it's a nice space with good lighting, making the trek there feels useless unless you arrive at the crack of dawn.",
      wifi: "ok",
      outlets: "none",
      noise: "moderate",
      visited: "March 2026"
    },
    {
      name: "Gather",
      neighborhood: "Lower East Side",
      address: "54 Orchard St, New York, NY 10002",
      rating: 3.4,
      review: "A nice place to do work — lots of seats and the space feels genuinely motivating. Quiet enough to do an interview, and the bathroom is really clean. Downside is the WiFi is slow and the menu is seriously overpriced. If you're willing to pay for the vibe, go for it.",
      wifi: "ok",
      outlets: "some",
      noise: "quiet",
      visited: "March 2026"
    },
    {
      name: "Hungry Llama",
      neighborhood: "Williamsburg",
      address: "679 Washington St, Manhattan",
      rating: 2.9,
      review: "Lowkey mid as fuck; the design looks so weird with all of the random chairs that they use, and if you are someone that needs a clear space to do work, that cluttered environemnt wont do you any good. Overpriced drinks that look aesthetic but taste mid after your 5th sip. Honestly, make sure your computer is chanrged and try to get a seat by the window. Not good for solo work if you want a quiet space, but kind of a vibe for group work if this is your last resort, LOL.",
      wifi: "ok",
      outlets: "some",
      noise: "moderate",
      visited: "Oct 2025"
    },
    {
      name: "Butler",
      neighborhood: "Lower East Side",
      address: "115 Allen St, Manhattan",
      rating: 5,
      review: "Hidden gem. Calm, well-lit, and unpretentious. The kind of place you tell one friend about and regret it. Incredible for long writing sessions — I've drafted entire papers here.",
      wifi: "great",
      outlets: "plenty",
      noise: "quiet",
      visited: "Oct 2025"
    },
    {
      name: "Colson Patisserie",
      neighborhood: "Brooklyn Heights",
      address: "374 9th St, Brooklyn",
      rating: 4,
      review: "More café than patisserie at this point. The pastries are unreal and the back room is quiet enough for calls. WiFi requires asking for a password but it's solid. Lovely neighborhood energy.",
      wifi: "ok",
      outlets: "some",
      noise: "quiet",
      visited: "Sep 2025"
    }
  ];

  function tagClass(level) {
    if (["great","plenty","quiet"].includes(level)) return "good";
    if (["ok","some","moderate"].includes(level)) return "ok";
    return "bad";
  }

  function buildCard(c) {
    return `
    <div class="card" data-neighborhood="${c.neighborhood}">
      <div class="card-top">
        <div class="card-neighborhood">${c.neighborhood}</div>
        <div class="card-name">${c.name}</div>
        <div class="card-address">${c.address}</div>
        <div class="card-rating">
         <span class="rating-badge">${c.rating}</span>
<div class="rating-bar-track"><div class="rating-bar-fill" style="width:${(c.rating / 5) * 100}%"></div></div>
<span class="rating-num">/ 5</span>
        </div>
      </div>
      <p class="card-review">${c.review}</p>
      <div class="card-tags">
        <div class="tag ${tagClass(c.wifi)}"><span class="tag-icon">⚡</span>WiFi ${c.wifi}</div>
        <div class="tag ${tagClass(c.outlets)}"><span class="tag-icon">🔌</span>Outlets ${c.outlets}</div>
        <div class="tag ${tagClass(c.noise)}"><span class="tag-icon">🔉</span>${c.noise}</div>
      </div>
      <div class="card-footer">
        <span class="visited-date">visited ${c.visited}</span>
        <span class="visited-badge">✓ been here</span>
      </div>
    </div>`;
  }

  function render(filter) {
    const grid = document.getElementById('café-grid');
    const filtered = filter === 'all' ? cafes : cafes.filter(c => c.neighborhood === filter);
    document.getElementById('total-count').textContent = filtered.length;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty"><p>no cafés in this neighborhood yet.</p></div>`;
    } else {
      grid.innerHTML = filtered.map(buildCard).join('');
    }
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.filter);
    });
  });

  render('all');
</script>
</body>
</html>
